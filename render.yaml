services:
  - type: web
    name: hostel-management-fullstack
    env: python
    buildCommand: "bash render-build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_VERSION
        value: 20.12.2
